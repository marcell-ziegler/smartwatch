; ===========================================================================
;  Railway pocket-watch  -  two build targets from one codebase
; ---------------------------------------------------------------------------
;   pio run -e native            build the desktop simulator
;   .pio/build/native/program    run it (or: pio run -e native -t exec, see README)
;
;   pio run -e esp32 -t upload   flash the Feather ESP32 V2
;   pio device monitor           serial monitor  (115200)
; ===========================================================================

[platformio]
default_envs = native
src_dir = src
include_dir = include

; ---------------------------------------------------------------------------
;  Shared application code lives in src/app.* and is compiled by BOTH envs.
;  Target-specific entry points and the native mocks are filtered in/out below.
; ---------------------------------------------------------------------------

[env:esp32]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ILI9341 @ ^1.6.1
    adafruit/Adafruit STMPE610 @ ^1.1.5
    adafruit/Adafruit BusIO @ ^1.14.5
    mikalhart/TinyGPSPlus @ ^1.0.3
; The Arduino-ESP32 core defaults to -std=gnu++11; the shared app/timetable
; code uses C++17 (std::optional, aggregate ClockTime, <charconv>). Match the
; native env's standard so the same sources compile on both targets.
build_unflags = -std=gnu++11
build_flags = -std=gnu++17
; compile everything EXCEPT the native-only sources
build_src_filter =
    +<*>
    -<native/>
    -<main_native.cpp>

; ---------------------------------------------------------------------------
;  Desktop simulator.  Compiles the *real* Adafruit_GFX against a tiny
;  Arduino-compat shim (src/native/arduino_compat) and renders to an SDL2
;  window via lib/pcdisplay/PCDisplay.
; ---------------------------------------------------------------------------
[env:native]
platform = native
; No lib_deps here: lib/adafruit_gfx_core/ is a local, trimmed vendor copy of
; upstream Adafruit_GFX (base class + glcdfont only, no SPITFT/GrayOLED, so
; it never needs Adafruit_I2CDevice.h/Adafruit_SPIDevice.h/Wire/SPI). Ignore
; the hardware driver + bus libs so the LDF doesn't try to compile them for
; the desktop even if something on esp32-only paths still references them.
lib_ignore =
    Adafruit GFX Library
    Adafruit BusIO
    Adafruit ILI9341
    Adafruit STMPE610
    TinyGPSPlus
    Wire
    SPI
; LDF's framework-compatibility heuristic flags our vendored Adafruit_GFX
; core as "arduino-only" even with framework unset here; disable that check.
lib_compat_mode = off
lib_ldf_mode = chain
; -I points Adafruit_GFX's  #include "Arduino.h"  at our shim.
; SDL2 flags come from pkg-config (Linux/macOS with brew).
build_flags =
    -std=gnu++17
    -D ARDUINO=10808
    -I src/native/arduino_compat
    !pkg-config --cflags sdl2
build_src_filter =
    +<*>
    -<main_esp32.cpp>
; link SDL2
build_unflags =
extra_scripts = pre:sdl_link.py
